global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "scheduler"
    static_configs:
      - targets: ["scheduler:8000"]
    metrics_path: /
    scrape_interval: 5s

  - job_name: "scheduler-api"
    static_configs:
      - targets: ["scheduler:5001"]
    metrics_path: /metrics
    scrape_interval: 10s
